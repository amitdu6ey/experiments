name: Deploy Pokemon to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pokemon/**'
      - '.github/workflows/deploy-pokemon.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Build site structure
        run: |
          mkdir -p _site/exp/pokedex
          cp -r pokemon/. _site/exp/pokedex/
          # Root redirect → /exp/pokedex/
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=exp/pokedex/">
          <link rel="canonical" href="exp/pokedex/">
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
